name: Update README

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Generate missing thumbnails
        run: python3 scripts/generate_thumbnails.py

      - name: Regenerate talks list
        run: python3 scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md slides/*/assets/thumbnail.jpeg 2>/dev/null || true
          git diff --cached --quiet || (
            git commit -m "docs: update talks list and thumbnails [skip ci]" &&
            git push
          )
