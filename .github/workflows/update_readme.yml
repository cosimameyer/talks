name: Update README

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate talks list
        run: python3 scripts/update_readme.py

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: update talks list"
          branch: bot/update-readme
          title: "docs: update talks list"
          body: "Auto-generated by the Update README workflow."
          delete-branch: true
