# What is Git?

- A software that allows you to track changes → [**version control**](https://git-scm.com/book/en/v2/Getting-Started-What-is-Git%3F)

- It allows you to **work collaboratively in teams**

- But it's also great to have your **own personal version control!**

### Step-by-step

.center[![reactivity](img/rproj.png)]

---
### Step-by-step

3) Link it with your GitHub repository

.center[![reactivity](img/github-link.png)]

---
### Step-by-step

4) You're all set: Your version control is up-and-running! &lt;span style="font-size:1.5em"&gt;🥳&lt;/span&gt;

![](img/git-control.png)

---
### Step-by-step

5) Populate your project


```r
# Set up the folder structure
folder_names &lt;- (
    # Main folders
  c("data", "code", "figures",
    # Sub-folders
    "data/raw", "data/processed"))

for (j in seq_along(folder_names)) {
  dir.create(folder_names[j])
}
```

---
### Step-by-step

5) Populate your project


```r
# Add files to the folders
file_names &lt;- (
  c(
   # For preparing your data 
    "1_data_preparation",
   # The merging file might also be combined 
   # with the first file
    "2_merging", 
   # For your descriptives
    "3_descriptives",
   # For your analysis
    "4_analysis", 
   # For your visualization
    "5_visualization"
  )
)
```

---
### Step-by-step

5) Populate your project


```r
# Create files
for (j in seq_along(file_names)) {
  file.create(paste0("code/", file_names[j], ".Rmd"))
}

# Create a helper function file
file.create("code/helper.R")
```
