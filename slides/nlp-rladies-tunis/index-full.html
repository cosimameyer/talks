# Quanteda

---

## Quanteda

- `quanteda`: **qu**antitative **an**alysis of **te**xtual **da**ta
  - Fully-featured package that allows you to easily perform NLP tasks

- What are alternatives?
  - `tm`: simpler grammar but fewer features

  - `tidytext`: good integration with the `tidyverse`

  - `koRpus`: good for part-of-speech tagging

---

## How do we use quanteda?

1) **Import** the data 

2) Build a **corpus**

3) **Pre-process your data**

4) Calculate a **document-feature matrix** (DFM)
--
![](dfm.png)
&lt;center&gt;&lt;small&gt;&lt;a href="https://www.mzes.uni-mannheim.de/socialsciencedatalab/article/advancing-text-mining/#stm"&gt;Methods Bites (2019)&lt;/a&gt;&lt;/small&gt;&lt;/center&gt; 

---
## How do we use quanteda?

1) **Import** the data 


```r
# Load packages
library(quanteda) # For NLP

load("UN-data.RData")
```

---
## How do we use quanteda?

2) Build a **corpus**


```r
mycorpus &lt;- corpus(un_data)

# Assigns a unique identifier to each text
docvars(mycorpus, "Textno") &lt;-
  sprintf("%02d", 1:ndoc(mycorpus)) 
```

---
## How do we use quanteda?

3) **Preprocess the text**

.pull-left[Steps in the pre-processing world:

- Remove numbers
- Remove punctuation
- Remove symbols
- Remove URLS
- Remove hyphens
- But keep doc vars
]
.pull-right[

```r
# Create tokens
token &lt;-
  tokens(
    mycorpus,
    remove_numbers = TRUE,
    remove_punct = TRUE,
    remove_symbols = TRUE,
    remove_url = TRUE,
    split_hyphens = TRUE,
    include_docvars = TRUE
  )
```
]

---
## How do we use quanteda?


```r
# Clean tokens created by OCR
token_ungd &lt;- tokens_select(
  token,
  c("[\\d-]", "[[:punct:]]", "^.{1,2}$"),
  selection = "remove",
  valuetype = "regex",
  verbose = TRUE
)
```

```
## removed 1,619 features
```

---
layout: false

---
## How do we use quanteda?

4) Calculate a **document-feature matrix** (DFM)

.pull-left[Here, we also:

- Lower the text
- Stem the words
- remove stop words
]
.pull-right[

```r
mydfm &lt;- dfm(
  token_ungd,
  tolower = TRUE,
  stem = TRUE,
  remove =
    stopwords("english")
)
```
]
--

```

## How do we use quanteda?

Trim the words: remove all the words that appear less than 7.5% of the time and more than 90% of the time


```r
mydfm.trim &lt;-
  dfm_trim(
    mydfm,
    min_docfreq = 0.075,
    # min 7.5%
    max_docfreq = 0.90,
    #  max 90%
    docfreq_type = "prop"
  ) 
```

## Unsupervised approach:&lt;/br&gt;Topic models

![reactivity](stm1.png)

???
- TM: unsupervised machine learning technique
- the main idea: they discover the "main theme" of what you have in a topic

- capable of scanning a set of documents, detecting word and phrase patterns within them
- automatically clusters word groups and similar expressions that best characterize a set of documents

- in a nutshell: detect topics from texts

## Unsupervised approach:&lt;/br&gt;Topic models

- [**Latent Dirichlet Allocation (LDA)**](https://towardsdatascience.com/light-on-math-machine-learning-intuitive-guide-to-latent-dirichlet-allocation-437c81220158) 


- [**Structural Topic Models**](http://www.luigicurini.com/uploads/6/7/9/8/67985527/stm_paper_ajps12103.pdf): extension of LDA but takes other context variables (e.g., information about the document) into account

???
Intuition behind LDA/TM: 
Each document can be described by a distribution of topics
and each topic can be described by a distribution of words

---

## Unsupervised approach:&lt;/br&gt;Topic models
.pull-left[![reactivity](stm5.png)
]
.pull-right[

```r
# Load package
library(stm)

# Assigns the number of topics
topic.count &lt;- 5

dfm2stm &lt;- convert(mydfm.trim,
                   to = "stm")

model.stm &lt;- stm(
  dfm2stm$documents,
  dfm2stm$vocab,
  K = topic.count,
  data = dfm2stm$meta,
  init.type = "Spectral"
)
```
]
